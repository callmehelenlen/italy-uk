<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet as Tiramisu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; --italy-gold: #C5A059; }
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; color: #1F2937; -webkit-tap-highlight-color: transparent; }
        
        .banner { height: 350px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 25px 50px 25px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%); }
        
        .tz-card { background: rgba(255,255,255,0.1); backdrop-blur: 10px; border-radius: 15px; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.2); }
        .main-card { margin-top: -40px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 10; padding: 25px 20px 120px 20px; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); }
        
        .tab-btn { padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 10px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); letter-spacing: 1px; color: rgba(255,255,255,0.6); }
        .tab-btn.active { background: var(--italy-red); color: white; border-color: var(--italy-red); box-shadow: 0 5px 15px rgba(139,0,0,0.3); }
        
        .day-pill.active { background: var(--italy-red); color: white; box-shadow: 0 8px 15px rgba(139,0,0,0.25); }
        
        /* 酒店卡片特別樣式 */
        .item-card { border-radius: 24px; background: #fff; padding: 20px; border: 1px solid #F3F4F6; position: relative; margin-bottom: 4px; }
        .item-card.stay-card { background: #F5F3FF; border: 2px solid #DDD6FE; margin-bottom: 20px; }
        .item-card.stay-card::before { background: #8B5CF6; }
        .item-card::before { content: ''; position: absolute; left: 0; top: 20px; bottom: 20px; width: 4px; background: var(--italy-gold); border-radius: 0 4px 4px 0; }

        .transit-container { margin: 8px 0 8px 35px; padding-left: 20px; border-left: 2px dashed #E5E7EB; display: flex; align-items: center; gap: 8px; min-height: 35px; }
        .transit-info-badge { background: #F8FAFC; border: 1px solid #F1F5F9; padding: 6px 14px; border-radius: 14px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; color: #64748B; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 64px; height: 64px; background: var(--italy-red); border-radius: 22px; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 100; box-shadow: 0 10px 25px rgba(139,0,0,0.3); border:none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="absolute top-6 left-6 right-6 flex justify-between gap-2">
            <div v-for="tz in timezones" :key="tz.label" class="tz-card flex-1 text-center">
                <div class="text-[8px] font-black text-white/50 uppercase tracking-tighter">{{ tz.label }}</div>
                <div class="text-xs font-black text-white leading-none mt-1">{{ tz.time }}</div>
            </div>
        </div>
        <div class="relative z-10">
            <h1 class="text-white text-4xl font-black italic mb-0.5">Sweet as Tiramisu</h1>
            <p class="text-white/80 text-[10px] font-bold tracking-[0.2em] uppercase mb-6">{{ countdownText }}</p>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <button @click="currentTab = 'itinerary'" :class="['tab-btn shrink-0', currentTab === 'itinerary' ? 'active' : '']">ITINERARY</button>
                <button @click="currentTab = 'expense'" :class="['tab-btn shrink-0', currentTab === 'expense' ? 'active' : '']">EXPENSE</button>
                <button @click="currentTab = 'tools'" :class="['tab-btn shrink-0', currentTab === 'tools' ? 'active' : '']">TOOLS</button>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-8 pb-2 no-scrollbar">
                <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" 
                     :class="['day-pill shrink-0 w-[54px] py-4 rounded-[22px] text-center cursor-pointer transition-all', selectedDayIndex === index ? 'active' : 'bg-[#F9F8F6] text-[#D1D5DB]']">
                    <div class="text-[10px] font-bold opacity-60">{{ day.weekday }}</div>
                    <div class="text-xl font-black">{{ day.date }}</div>
                    <div v-if="day.date === '22'" class="text-[8px] mt-1">🎂</div>
                </div>
            </div>

            <div class="space-y-0">
                <template v-for="(item, index) in currentDayPlans" :key="item.id">
                    <div @click="editItem(item)" :class="['item-card shadow-sm', item.category === 'Stay' ? 'stay-card' : '']">
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-stone-100 text-stone-600 px-3 py-1 rounded-full font-black text-[10px]">{{ item.time }}</span>
                            <div class="flex gap-2">
                                <button v-if="item.link" @click.stop="window.open(item.link, '_blank')" class="text-blue-400"><i class="fa-solid fa-location-arrow"></i></button>
                                <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-circle-xmark"></i></button>
                            </div>
                        </div>
                        <div class="font-black text-gray-800 text-lg mb-1">
                            <span v-if="item.category === 'Stay' && item.dayDate !== days[selectedDayIndex].date" class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded mr-2 uppercase">Everyday Stay</span>
                            {{ item.name }}
                        </div>
                        <div class="text-[9px] font-black text-stone-400 uppercase mb-2">
                            <i :class="['fa-solid', getCategoryIcon(item.category)]" class="mr-1"></i> {{ item.category }}
                        </div>
                        <div v-if="item.note" class="text-gray-500 text-xs mb-3 whitespace-pre-wrap">{{ item.note }}</div>
                        
                        <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="inline-flex items-center gap-2 text-blue-600 font-bold text-[10px] bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                            <i class="fa-solid fa-location-dot"></i> Open Maps
                        </a>
                    </div>

                    <div v-if="index < currentDayPlans.length - 1 && item.category !== 'Stay'" class="transit-container">
                        <div v-if="!item.transitRemark" @click="openTransitModal(item)" class="opacity-20 cursor-pointer p-2"><i class="fa-solid fa-plus-circle"></i></div>
                        <div v-else @click="openTransitModal(item)" class="transit-info-badge shadow-sm">
                            <i :class="['fa-solid', getTransitIcon(item.transitMode || 'walk')]"></i>
                            <span>{{ item.transitRemark }}</span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div v-if="currentTab === 'expense'">
            <div class="bg-stone-900 text-white p-8 rounded-[35px] mb-8 shadow-xl text-center">
                <div class="text-[10px] font-bold text-white/40 uppercase mb-1">Total Spent</div>
                <div class="text-4xl font-black">HK$ {{ totalSpentHKD }}</div>
            </div>
            <div v-for="ex in sortedExpenses" :key="ex.id" @click="editExpense(ex)" class="flex justify-between items-center bg-white p-5 rounded-3xl border border-stone-100 mb-3">
                <div>
                    <div class="font-black text-gray-800">{{ ex.name }}</div>
                    <div class="text-[10px] font-bold text-stone-300 uppercase">{{ getCurrencySymbol(ex.currency) }}{{ ex.amount }}</div>
                </div>
                <div class="text-right font-black text-emerald-600">≈ HK${{ convertToHKD(ex.amount, ex.currency) }}</div>
            </div>
        </div>
    </div>

    <button v-if="currentTab !== 'tools'" class="fab" @click="openAddModal"><i class="fa-solid fa-plus"></i></button>

    <div v-if="showModal" class="fixed inset-0 z-[200] flex items-end bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[40px] max-h-[90vh] overflow-y-auto pb-12">
            <h3 class="font-black text-2xl mb-6">Plan Details</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-5 gap-2">
                    <div v-for="cat in ['Spot', 'Food', 'Shop', 'Flight', 'Stay']" :key="cat" @click="form.category = cat" :class="['p-2 rounded-xl border-2 text-center', form.category === cat ? 'border-[#8B0000] bg-[#FFF5F5] text-[#8B0000]' : 'border-gray-50 text-gray-400']">
                        <i :class="['fa-solid', getCategoryIcon(cat)]" class="block text-sm mb-1"></i>
                        <span class="text-[8px] font-black uppercase">{{ cat }}</span>
                    </div>
                </div>
                <input v-model="form.name" placeholder="Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold">
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="form.time" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold">
                    <input v-model="form.endTime" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold">
                </div>
                <textarea v-model="form.note" placeholder="Notes (e.g. 15-24 to show every day)" class="w-full p-4 bg-gray-50 rounded-2xl h-24 text-sm"></textarea>
                <input v-model="form.link" placeholder="Google Maps Link" class="w-full p-4 bg-gray-50 rounded-2xl text-xs">
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-5 rounded-2xl font-black">SAVE</button>
                <button @click="showModal = false" class="w-full py-2 text-stone-300 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div v-if="showTransitModal" class="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm p-8 rounded-[40px]">
            <h3 class="font-black text-xl mb-6 text-center">Route</h3>
            <div class="grid grid-cols-5 gap-2 mb-6">
                <div v-for="m in ['walk', 'bus', 'train', 'taxi', 'plane']" :key="m" @click="transitForm.mode = m" :class="['p-3 rounded-xl border-2 text-center', transitForm.mode === m ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-gray-50 text-gray-300']">
                    <i :class="['fa-solid', getTransitIcon(m)]"></i>
                </div>
            </div>
            <input v-model="transitForm.remark" placeholder="e.g. 15 mins walk" class="w-full p-4 bg-gray-50 rounded-2xl font-bold mb-6 text-center">
            <button @click="saveTransit" class="w-full bg-black text-white py-4 rounded-2xl font-black">SAVE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrFeReAOrWqTnGCfFRVjLM1dZ09ar-OyE",
        authDomain: "italy-uk-trip.firebaseapp.com",
        projectId: "italy-uk-trip",
        databaseURL: "https://italy-uk-trip-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const selectedDayIndex = ref(0);
            const showModal = ref(false);
            const showTransitModal = ref(false);
            const rates = ref({ eur: 8.5, gbp: 10.2 });
            const timezones = ref([
                { label: 'HKG', zone: 'Asia/Hong_Kong', time: '' },
                { label: 'ITA', zone: 'Europe/Rome', time: '' },
                { label: 'GBR', zone: 'Europe/London', time: '' }
            ]);
            const days = [
                { date: '14', weekday: 'THU' }, { date: '15', weekday: 'FRI' }, { date: '16', weekday: 'SAT' },
                { date: '17', weekday: 'SUN' }, { date: '18', weekday: 'MON' }, { date: '19', weekday: 'TUE' },
                { date: '20', weekday: 'WED' }, { date: '21', weekday: 'THU' }, { date: '22', weekday: 'FRI' },
                { date: '23', weekday: 'SAT' }, { date: '24', weekday: 'SUN' }, { date: '25', weekday: 'MON' }
            ];
            const itinerary = ref([]);
            const expenses = ref([]);
            const form = ref({ id: null, name: '', time: '12:00', dayDate: '', category: 'Spot', link: '', note: '' });
            const transitForm = ref({ mode: 'walk', remark: '' });
            const activeTransitItem = ref(null);

            onMounted(() => {
                db.ref('plans').on('value', s => itinerary.value = s.val() ? Object.values(s.val()) : []);
                db.ref('expenses').on('value', s => expenses.value = s.val() ? Object.values(s.val()) : []);
                db.ref('rates').on('value', s => { if(s.val()) rates.value = s.val(); });
                setInterval(() => {
                    timezones.value.forEach(tz => {
                        tz.time = new Date().toLocaleTimeString('en-GB', { timeZone: tz.zone, hour: '2-digit', minute: '2-digit', hour12: false });
                    });
                }, 1000);
            });

            // 關鍵：跨日顯示酒店的計算邏輯
            const currentDayPlans = computed(() => {
                const activeDate = parseInt(days[selectedDayIndex.value].date);
                return itinerary.value.filter(p => {
                    // 1. 直接匹配當天日期
                    if (p.dayDate === days[selectedDayIndex.value].date) return true;
                    // 2. Stay 類別且 Note 包含範圍 (如 "15-24")
                    if (p.category === 'Stay' && p.note) {
                        const match = p.note.match(/(\d+)-(\d+)/);
                        if (match) {
                            const start = parseInt(match[1]);
                            const end = parseInt(match[2]);
                            return activeDate >= start && activeDate <= end;
                        }
                    }
                    return false;
                }).sort((a,b) => {
                    // 酒店永遠置頂，其他按時間排
                    if (a.category === 'Stay' && b.category !== 'Stay') return -1;
                    if (a.category !== 'Stay' && b.category === 'Stay') return 1;
                    return a.time.localeCompare(b.time);
                });
            });

            return { 
                currentTab, days, selectedDayIndex, timezones, rates, currentDayPlans,
                totalSpentHKD: computed(() => expenses.value.reduce((sum, ex) => sum + parseFloat(ex.currency==='HKD'?ex.amount:ex.amount*(ex.currency==='EUR'?rates.value.eur:rates.value.gbp)), 0).toFixed(0)),
                sortedExpenses: computed(() => [...expenses.value].sort((a,b) => b.id - a.id)),
                showModal, showTransitModal, form, transitForm,
                countdownText: computed(() => {
                    const diff = Math.ceil((new Date('2026-05-14').getTime() - new Date().getTime()) / (1000*60*60*24));
                    return diff > 0 ? `${diff} Days until Italy 🍕` : "Enjoy!";
                }),
                handleSave: () => { const id = form.value.id || Date.now(); db.ref('plans/' + id).set({ ...form.value, id }); showModal.value = false; },
                editItem: (item) => { form.value = {...item}; showModal.value = true; },
                removeItem: (id) => { if(confirm('Delete?')) db.ref('plans/' + id).remove(); },
                openTransitModal: (item) => { activeTransitItem.value = item; transitForm.value = { mode: item.transitMode || 'walk', remark: item.transitRemark || '' }; showTransitModal.value = true; },
                saveTransit: () => { db.ref('plans/'+activeTransitItem.value.id).update({ transitMode: transitForm.value.mode, transitRemark: transitForm.value.remark }); showTransitModal.value = false; },
                getCategoryIcon: (cat) => ({ Food:'fa-utensils', Flight:'fa-plane', Shop:'fa-bag-shopping', Spot:'fa-camera', Stay:'fa-hotel' }[cat] || 'fa-location-dot'),
                getTransitIcon: (mode) => ({ walk:'fa-person-walking', bus:'fa-bus', train:'fa-train', taxi:'fa-taxi', plane:'fa-plane' }[mode] || 'fa-person-walking'),
                getCurrencySymbol: (c) => ({ HKD: 'HK$', EUR: '€', GBP: '£' }[c]),
                convertToHKD: (a, c) => (c === 'HKD' ? a : (a * (c === 'EUR' ? rates.value.eur : rates.value.gbp))).toFixed(1),
                openAddModal: () => { form.value = { id: null, name: '', time: '12:00', dayDate: days[selectedDayIndex.value].date, category: 'Spot', link: '', note: '' }; showModal.value = true; }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
