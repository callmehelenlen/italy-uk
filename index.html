<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helen & Ryan's Getaway</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; }
        body { background-color: #FDFBF7; font-family: -apple-system, sans-serif; color: #1F2937; }
        .banner { min-height: 400px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 25px 45px 25px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.95) 100%); }
        .tz-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 8px 12px; display: inline-flex; gap: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .tz-time { font-size: 11px; font-weight: 800; color: white; font-variant-numeric: tabular-nums; }
        .tab-btn { padding: 12px 18px; border-radius: 16px; font-weight: 800; font-size: 10px; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: white; color: var(--italy-red); }
        .main-card { margin-top: -35px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 20; padding: 25px 20px 120px 20px; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); }
        .day-pill.active { background: var(--italy-red); color: white; transform: scale(1.05); }
        .stay-section { border: 2px dashed #8B0000; background: #FFF9F9; border-radius: 30px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .transit-container { margin-left: 35px; border-left: 2px dashed #E5E7EB; padding: 15px 0 15px 25px; position: relative; }
        .transit-badge { background: #F8FAFC; border: 1px solid #F1F5F9; padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 800; color: #64748B; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .item-card { border-radius: 24px; background: #fff; padding: 20px; border: 1px solid #F3F4F6; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .cat-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 68px; height: 68px; background: var(--italy-red); border-radius: 24px; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 100; box-shadow: 0 12px 30px rgba(139,0,0,0.4); border: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10">
            <h1 class="text-white text-3xl font-black italic mb-1">Sweet as Tiramisu</h1>
            <p class="text-white/90 text-sm font-bold mb-4">Helen & Ryan’s Romantic Italy + UK Getaway</p>
            <div class="tz-card">
                <div class="text-center"><div class="text-[8px] text-white/50 uppercase font-black">HK</div><div class="tz-time">{{ times.hk }}</div></div>
                <div class="text-center border-l border-white/10 pl-4"><div class="text-[8px] text-white/50 uppercase font-black">Italy</div><div class="tz-time">{{ times.it }}</div></div>
                <div class="text-center border-l border-white/10 pl-4"><div class="text-[8px] text-white/50 uppercase font-black">UK</div><div class="tz-time">{{ times.uk }}</div></div>
            </div>
            <div class="flex gap-2"><button @click="currentTab='itinerary'" :class="['tab-btn', currentTab==='itinerary'?'active':'']">ITINERARY</button><button @click="currentTab='expense'" :class="['tab-btn', currentTab==='expense'?'active':'']">EXPENSE</button><button @click="currentTab='tools'" :class="['tab-btn', currentTab==='tools'?'active':'']">TOOLS</button></div>
        </div>
    </div>

    <div class="main-card">
        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-6 pb-2 no-scrollbar">
                <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" :class="['day-pill shrink-0 w-[55px] py-4 rounded-[22px] text-center transition-all', selectedDayIndex === index ? 'active' : 'bg-[#F9F8F6] text-[#D1D5DB]']">
                    <div class="text-[9px] font-bold uppercase">{{ day.weekday }}</div><div class="text-xl font-black">{{ day.date }}</div>
                    <div v-if="day.date == '22'" class="text-[8px] mt-1">🎂</div>
                </div>
            </div>

            <div v-if="currentStay" class="stay-section" @click="editItem(currentStay)">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 bg-white rounded-full flex items-center justify-center text-red-800 shadow-sm"><i class="fa-solid fa-hotel"></i></div>
                    <div>
                        <div class="text-[9px] font-black text-red-500 uppercase tracking-widest">Tonight's Accommodation</div>
                        <div class="font-black text-gray-800 text-lg leading-tight">{{ currentStay.name }}</div>
                        <div class="text-[10px] text-gray-400 font-bold uppercase italic">{{ currentStay.note }}</div>
                    </div>
                </div>
                <a v-if="currentStay.link" :href="currentStay.link" target="_blank" @click.stop class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 border border-blue-100"><i class="fa-solid fa-location-dot"></i></a>
            </div>

            <div class="space-y-0">
                <template v-for="(item, index) in currentDayPlans" :key="item.id">
                    <div @click="editItem(item)" class="item-card">
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-stone-100 text-stone-600 px-3 py-1 rounded-full font-black text-[10px]">
                                {{ item.time }} <span v-if="item.endTime"> - {{ item.endTime }}</span>
                            </span>
                            <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                        </div>
                        <div :class="['cat-badge', getCatClass(item.category)]">
                            <i :class="['fa-solid', getCategoryIcon(item.category)]"></i> {{ item.category }}
                        </div>
                        <div class="font-black text-gray-800 text-xl mb-1 leading-tight">{{ item.name }}</div>
                        <div v-if="item.note" class="text-gray-500 text-xs mb-3 whitespace-pre-wrap">{{ item.note }}</div>
                        <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="inline-flex items-center gap-2 text-blue-600 font-black text-[10px] bg-blue-50 px-3 py-2 rounded-xl border border-blue-100"><i class="fa-solid fa-map-pin"></i> MAP</a>
                    </div>
                    <div v-if="index < currentDayPlans.length - 1" class="transit-container">
                        <div @click="openTransitModal(item)" class="transit-badge">
                            <i :class="['fa-solid', getTransitIcon(item.transitMode || 'walk')]"></i>
                            <span>{{ item.transitRemark || 'Add Route' }}</span>
                        </div>
                        <a v-if="item.transitLink" :href="item.transitLink" target="_blank" class="ml-2 inline-flex w-7 h-7 bg-indigo-50 rounded-full items-center justify-center text-indigo-500 text-[10px] border border-indigo-100"><i class="fa-solid fa-route"></i></a>
                    </div>
                </template>
            </div>
        </div>

        </div>

    <button v-if="currentTab !== 'tools'" class="fab" @click="openAddModal"><i class="fa-solid fa-plus"></i></button>

    <div v-if="showModal" class="fixed inset-0 z-[300] flex items-end bg-black/70 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[45px] max-h-[90vh] overflow-y-auto pb-12 shadow-2xl">
            <h3 class="font-black text-2xl mb-8 text-center text-gray-800">Plan Detail</h3>
            <div class="space-y-5">
                <div class="grid grid-cols-6 gap-2">
                    <div v-for="cat in ['Spot', 'Food', 'Shop', 'Flight', 'Stay', 'Train']" :key="cat" @click="form.category = cat" :class="['p-3 rounded-xl border-2 text-center transition-all', form.category === cat ? 'border-indigo-600 bg-indigo-50 text-indigo-600 font-black' : 'border-gray-50 text-gray-300 font-bold']">
                        <i :class="['fa-solid', getCategoryIcon(cat)]" class="text-lg"></i>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black ml-2 text-gray-400 uppercase">Category (Type your own)</label>
                    <input v-model="form.category" placeholder="e.g. Hiking / Cinema" class="w-full p-4 bg-gray-50 rounded-2xl font-black outline-none border border-gray-100">
                </div>
                <input v-model="form.name" placeholder="Where are we going?" class="w-full p-5 bg-gray-100 rounded-2xl font-black outline-none text-lg">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-black ml-2 text-gray-400">START TIME</label><input v-model="form.time" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-black outline-none border border-gray-100"></div>
                    <div><label class="text-[9px] font-black ml-2 text-gray-400">END TIME</label><input v-model="form.endTime" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-black outline-none border border-gray-100"></div>
                </div>
                <textarea v-model="form.note" placeholder="Notes... (Use '15-24' in Note for Stay range)" class="w-full p-5 bg-gray-50 rounded-2xl h-24 font-bold text-sm outline-none border border-gray-100"></textarea>
                <input v-model="form.link" placeholder="Google Maps URL" class="w-full p-5 bg-gray-50 rounded-2xl text-xs outline-none border border-gray-100">
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-6 rounded-2xl font-black shadow-xl uppercase tracking-widest mt-4">Save Plan</button>
                <button @click="showModal = false" class="w-full py-2 text-stone-300 font-black text-center text-sm">Discard</button>
            </div>
        </div>
    </div>

    <div v-if="showTransitModal" class="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm p-8 rounded-[45px] shadow-2xl">
            <h3 class="font-black text-xl mb-6 text-center">Route Editor</h3>
            <div class="grid grid-cols-5 gap-2 mb-6">
                <div v-for="m in ['walk', 'bus', 'train', 'taxi', 'plane']" :key="m" @click="transitForm.mode = m" :class="['p-4 rounded-2xl border-2 text-center transition-all', transitForm.mode === m ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-gray-50 text-gray-400']">
                    <i :class="['fa-solid', getTransitIcon(m)]" class="text-xl"></i>
                </div>
            </div>
            <input v-model="transitForm.remark" placeholder="e.g. 15 mins Walk" class="w-full p-5 bg-gray-50 rounded-2xl font-bold mb-4 text-center border-none outline-none">
            <input v-model="transitForm.link" placeholder="Route Map Link" class="w-full p-5 bg-gray-50 rounded-2xl text-[10px] mb-8 outline-none text-center">
            <button @click="saveTransit" class="w-full bg-black text-white py-5 rounded-2xl font-black">Update Route</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBrFeReAOrWqTnGCfFRVjLM1dZ09ar-OyE", authDomain: "italy-uk-trip.firebaseapp.com", projectId: "italy-uk-trip", databaseURL: "https://italy-uk-trip-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const selectedDayIndex = ref(0);
            const showModal = ref(false), showTransitModal = ref(false);
            const days = [{ date:'14', weekday:'THU' },{ date:'15', weekday:'FRI' },{ date:'16', weekday:'SAT' },{ date:'17', weekday:'SUN' },{ date:'18', weekday:'MON' },{ date:'19', weekday:'TUE' },{ date:'20', weekday:'WED' },{ date:'21', weekday:'THU' },{ date:'22', weekday:'FRI' },{ date:'23', weekday:'SAT' },{ date:'24', weekday:'SUN' },{ date:'25', weekday:'MON' }];
            const itinerary = ref([]);
            const form = ref({ id: null, name: '', time: '09:00', endTime: '', dayDate: '', category: 'Spot', link: '', note: '' });
            const transitForm = ref({ mode: 'walk', remark: '', link: '' });
            const activeTransitItem = ref(null);
            const times = ref({ hk:'--', it:'--', uk:'--' });

            onMounted(() => {
                db.ref('plans').on('value', s => itinerary.value = s.val() ? Object.values(s.val()) : []);
                setInterval(() => {
                    const now = new Date();
                    const opt = { hour:'2-digit', minute:'2-digit', hour12:false };
                    times.value.hk = now.toLocaleTimeString('en-GB', { ...opt, timeZone:'Asia/Hong_Kong' });
                    times.value.it = now.toLocaleTimeString('en-GB', { ...opt, timeZone:'Europe/Rome' });
                    times.value.uk = now.toLocaleTimeString('en-GB', { ...opt, timeZone:'Europe/London' });
                }, 1000);
            });

            const currentStay = computed(() => {
                const activeDateNum = parseInt(days[selectedDayIndex.value].date);
                return itinerary.value.find(p => {
                    if (p.category !== 'Stay') return false;
                    if (p.dayDate === days[selectedDayIndex.value].date) return true;
                    if (p.note && p.note.includes('-')) {
                        const m = p.note.match(/\d+/g);
                        if(m) return activeDateNum >= parseInt(m[0]) && activeDateNum <= parseInt(m[1]);
                    }
                    return false;
                });
            });

            const currentDayPlans = computed(() => {
                const sid = currentStay.value ? currentStay.value.id : null;
                return itinerary.value
                    .filter(p => p.dayDate === days[selectedDayIndex.value].date && p.id !== sid)
                    .sort((a,b) => a.time.localeCompare(b.time));
            });

            return {
                currentTab, days, selectedDayIndex, currentDayPlans, currentStay, showModal, showTransitModal, form, transitForm, times,
                handleSave: () => { const id = form.value.id || Date.now(); db.ref('plans/'+id).set({...form.value, id}); showModal.value=false; },
                removeItem: (id) => { if(confirm('Delete this plan?')) db.ref('plans/'+id).remove(); },
                getCategoryIcon: (cat) => ({ Food:'fa-utensils', Flight:'fa-plane', Shop:'fa-bag-shopping', Spot:'fa-camera', Stay:'fa-hotel', Train:'fa-train' }[cat] || 'fa-star'),
                getCatClass: (cat) => ({ Spot:'bg-orange-100 text-orange-600', Food:'bg-emerald-100 text-emerald-600', Shop:'bg-pink-100 text-pink-600', Flight:'bg-blue-100 text-blue-600', Stay:'bg-indigo-100 text-indigo-600', Train:'bg-amber-100 text-amber-600' }[cat] || 'bg-gray-100 text-gray-600'),
                getTransitIcon: (m) => ({ walk:'fa-person-walking', bus:'fa-bus', train:'fa-train', taxi:'fa-taxi', plane:'fa-plane' }[m] || 'fa-person-walking'),
                openAddModal: () => { form.value = { id: null, name: '', time: '09:00', endTime: '', dayDate: days[selectedDayIndex.value].date, category: 'Spot', link: '', note: '' }; showModal.value = true; },
                editItem: (item) => { form.value = {...item}; showModal.value = true; },
                openTransitModal: (item) => { activeTransitItem.value = item; transitForm.value = { mode: item.transitMode || 'walk', remark: item.transitRemark || '', link: item.transitLink || '' }; showTransitModal.value = true; },
                saveTransit: () => { db.ref('plans/'+activeTransitItem.value.id).update({ transitMode: transitForm.value.mode, transitRemark: transitForm.value.remark, transitLink: transitForm.value.link }); showTransitModal.value = false; }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
