<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet as Tiramisu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; --italy-gold: #C5A059; }
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; }
        .banner { height: 320px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 30px 60px 30px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 30%, rgba(0,0,0,0.8) 100%); }
        .main-card { margin-top: -45px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 10; padding: 20px; box-shadow: 0 -15px 40px rgba(0,0,0,0.08); }
        .tab-btn { width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: white; color: #E5E7EB; box-shadow: 0 8px 20px rgba(0,0,0,0.06); font-size: 20px; }
        .tab-btn.active { background: var(--italy-red); color: white; }
        .day-pill { flex-shrink: 0; width: 52px; padding: 12px 0; border-radius: 18px; text-align: center; cursor: pointer; transition: 0.2s; }
        .day-pill.active { background: var(--italy-red); color: white; box-shadow: 0 8px 15px rgba(139,0,0,0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .item-card { border-left: 4px solid var(--italy-gold); border-radius: 20px; background: #fff; margin-bottom: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #F3F4F6; }
        .hotel-box { background: #F9F8F6; border: 1px dashed #E5E0D8; padding: 18px; border-radius: 25px; margin-bottom: 25px; cursor: pointer; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--italy-red); border-radius: 20px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 100; border:none; box-shadow: 0 10px 20px rgba(139,0,0,0.3); }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10">
            <h1 class="text-white text-3xl font-black italic mb-1">Sweet as Tiramisu</h1>
            <p class="text-white/70 text-xs font-bold uppercase tracking-widest">Helen & Ryan’s 2026 Getaway</p>
        </div>
    </div>

    <div class="main-card">
        <div class="flex justify-center gap-5 -mt-12 mb-8 relative z-20">
            <button @click="currentTab = 'itinerary'" :class="{active: currentTab === 'itinerary'}" class="tab-btn"><i class="fa-solid fa-map"></i></button>
            <button @click="currentTab = 'expense'" :class="{active: currentTab === 'expense'}" class="tab-btn"><i class="fa-solid fa-receipt"></i></button>
        </div>

        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-8 pb-2 no-scrollbar">
                <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" 
                     :class="['day-pill', selectedDayIndex === index ? 'active' : 'bg-stone-50 text-stone-300']">
                    <div class="text-[9px] font-bold">{{ day.weekday }}</div>
                    <div class="text-lg font-black">{{ day.date }}</div>
                </div>
            </div>

            <div v-if="shouldShowHotel" class="hotel-box flex items-center justify-between" @click="openHotelModal">
                <div class="flex items-center flex-1 pr-4">
                    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center mr-3 shadow-sm text-[#C5A059]"><i class="fa-solid fa-bed"></i></div>
                    <div class="overflow-hidden">
                        <div class="text-[9px] font-black text-stone-400 uppercase tracking-widest">Accommodation</div>
                        <div class="font-bold text-gray-800 truncate">{{ currentDayHotel.name || 'Set Hotel' }}</div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a v-if="currentDayHotel.link" :href="currentDayHotel.link" target="_blank" @click.stop class="w-8 h-8 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center border border-amber-100">
                        <i class="fa-solid fa-location-arrow text-xs"></i>
                    </a>
                    <i class="fa-solid fa-pen text-stone-300 text-[10px]"></i>
                </div>
            </div>

            <div class="space-y-4">
                <div v-for="item in currentDayPlans" :key="item.id" @click="editItem(item)" class="item-card">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex flex-wrap gap-2">
                            <span class="bg-red-50 text-[#8B0000] px-2 py-0.5 rounded-lg font-black text-[11px]">
                                {{ item.time }} <template v-if="item.endTime">- {{item.endTime}}</template>
                            </span>
                            <span v-if="item.category" class="bg-stone-100 text-stone-500 px-2 py-0.5 rounded-lg font-bold text-[10px] uppercase">{{ item.category }}</span>
                        </div>
                        <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="font-black text-gray-800 text-lg leading-tight">{{ item.name }}</div>
                    <div v-if="item.note" class="text-gray-400 text-xs mt-2">{{ item.note }}</div>
                    <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="mt-4 inline-flex items-center gap-2 text-amber-600 font-bold text-[10px] bg-amber-50 px-3 py-1.5 rounded-lg">
                        <i class="fa-solid fa-location-dot"></i> GOOGLE MAPS
                    </a>
                </div>
                <div v-if="currentDayPlans.length === 0" class="text-center py-20 opacity-20 italic font-bold text-stone-400">No plans yet</div>
            </div>
        </div>
    </div>

    <button class="fab" @click="openAddModal"><i class="fa-solid fa-plus"></i></button>

    <div v-if="showModal" class="fixed inset-0 z-[200] flex items-end bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[40px] max-h-[90vh] overflow-y-auto">
            <h3 class="font-black text-2xl mb-6 text-gray-800">{{ isEditing ? 'Edit' : 'Add' }} Plan</h3>
            <div class="space-y-4">
                <input v-model="form.name" placeholder="Location Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="form.time" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                    <input v-model="form.endTime" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                </div>
                <input v-model="form.category" placeholder="Category" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <input v-model="form.link" placeholder="Google Maps URL" class="w-full p-4 bg-gray-50 rounded-2xl font-bold outline-none">
                <textarea v-model="form.note" placeholder="Notes..." class="w-full p-4 bg-gray-50 rounded-2xl h-24 outline-none"></textarea>
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-5 rounded-2xl font-black shadow-xl">SAVE</button>
                <button @click="showModal = false" class="w-full py-2 text-stone-400 font-bold text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <div v-if="showHotelModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/60">
        <div class="bg-white w-full max-w-sm p-8 rounded-[30px]">
            <h3 class="font-black text-xl mb-4">Set Accommodation</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-stone-400 ml-1">HOTEL NAME</label>
                    <input v-model="hotelForm.name" placeholder="Hotel Name" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-stone-400 ml-1">GOOGLE MAPS LINK</label>
                    <input v-model="hotelForm.link" placeholder="Paste URL here" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none text-blue-600 text-sm">
                </div>
                <button @click="saveHotel" class="w-full bg-black text-white py-4 rounded-xl font-black shadow-lg">Confirm</button>
                <button @click="showHotelModal = false" class="w-full py-2 text-stone-400 font-bold text-sm">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const showModal = ref(false);
            const showHotelModal = ref(false);
            const isEditing = ref(false);
            const selectedDayIndex = ref(1); 
            
            const days = [
                { date: '14', weekday: 'THU' }, { date: '15', weekday: 'FRI' }, { date: '16', weekday: 'SAT' },
                { date: '17', weekday: 'SUN' }, { date: '18', weekday: 'MON' }, { date: '19', weekday: 'TUE' },
                { date: '20', weekday: 'WED' }, { date: '21', weekday: 'THU' }, { date: '22', weekday: 'FRI' },
                { date: '23', weekday: 'SAT' }, { date: '24', weekday: 'SUN' }, { date: '25', weekday: 'MON' }
            ];

            const itinerary = ref([]);
            const hotels = ref({});
            const form = ref({ id: null, name: '', time: '12:00', endTime: '', category: '', link: '', note: '', dayDate: '' });
            const hotelForm = ref({ name: '', link: '' });

            onMounted(() => {
                const savedPlans = localStorage.getItem('tiramisu_vF2_plans');
                const savedHotels = localStorage.getItem('tiramisu_vF2_hotels');
                if (savedPlans) itinerary.value = JSON.parse(savedPlans);
                if (savedHotels) hotels.value = JSON.parse(savedHotels);
            });

            const currentDayPlans = computed(() => {
                const activeDate = days[selectedDayIndex.value].date;
                return itinerary.value.filter(p => p.dayDate === activeDate).sort((a, b) => a.time.localeCompare(b.time));
            });

            const shouldShowHotel = computed(() => {
                const d = parseInt(days[selectedDayIndex.value].date);
                return d >= 15 && d <= 24;
            });

            const currentDayHotel = computed(() => {
                const activeDate = days[selectedDayIndex.value].date;
                return hotels.value[activeDate] || { name: '', link: '' };
            });

            const openAddModal = () => {
                isEditing.value = false;
                form.value = { id: null, name: '', time: '12:00', endTime: '', category: '', link: '', note: '', dayDate: days[selectedDayIndex.value].date };
                showModal.value = true;
            };

            const editItem = (item) => {
                isEditing.value = true;
                form.value = { ...item };
                showModal.value = true;
            };

            const handleSave = () => {
                if (!form.value.name) return;
                if (isEditing.value) {
                    const idx = itinerary.value.findIndex(p => p.id === form.value.id);
                    if (idx !== -1) itinerary.value[idx] = { ...form.value };
                } else {
                    itinerary.value.push({ ...form.value, id: Date.now() });
                }
                localStorage.setItem('tiramisu_vF2_plans', JSON.stringify(itinerary.value));
                showModal.value = false;
            };

            const removeItem = (id) => {
                itinerary.value = itinerary.value.filter(p => p.id !== id);
                localStorage.setItem('tiramisu_vF2_plans', JSON.stringify(itinerary.value));
            };

            const openHotelModal = () => {
                hotelForm.value = { ...currentDayHotel.value };
                showHotelModal.value = true;
            };

            const saveHotel = () => {
                const activeDate = days[selectedDayIndex.value].date;
                hotels.value[activeDate] = { ...hotelForm.value };
                localStorage.setItem('tiramisu_vF2_hotels', JSON.stringify(hotels.value));
                showHotelModal.value = false;
            };

            return { 
                currentTab, days, selectedDayIndex, currentDayPlans, 
                showModal, showHotelModal, form, hotelForm, isEditing,
                shouldShowHotel, currentDayHotel, 
                openAddModal, editItem, handleSave, removeItem, openHotelModal, saveHotel 
            };
        }
    }).mount('#app');
</script>
</body>
</html>
