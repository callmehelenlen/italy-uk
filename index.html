<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet as Tiramisu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vuedraggable/4.1.0/vuedraggable.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; --italy-gold: #C5A059; }
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .banner { height: 350px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 30px 70px 30px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 20%, rgba(0,0,0,0.8) 100%); }
        .main-card { margin-top: -45px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 10; padding: 20px; box-shadow: 0 -15px 40px rgba(0,0,0,0.08); }
        .tab-btn { width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: white; color: #E5E7EB; box-shadow: 0 8px 20px rgba(0,0,0,0.06); font-size: 20px; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--italy-red); color: white; }
        .day-pill { flex-shrink: 0; width: 52px; padding: 12px 0; border-radius: 18px; text-align: center; cursor: pointer; }
        .day-pill.active { background: var(--italy-red); color: white; box-shadow: 0 8px 15px rgba(139,0,0,0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .item-card { border-left: 4px solid var(--italy-gold); border-radius: 20px; background: #fff; margin-bottom: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #F3F4F6; cursor: grab; }
        .hotel-box { background: #F9F8F6; border: 1px dashed #E5E0D8; padding: 18px; border-radius: 25px; margin-bottom: 25px; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 60px; height: 60px; background: var(--italy-red); border-radius: 20px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 100; box-shadow: 0 10px 25px rgba(139,0,0,0.3); border:none; }
        .drag-ghost { opacity: 0.3; background: #FEF2F2; border: 2px dashed var(--italy-red); }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10">
            <h1 class="text-white text-3xl font-black italic mb-1">Sweet as Tiramisu</h1>
            <p class="text-white/70 text-sm font-bold uppercase tracking-widest">Helen & Ryan’s 2026 Getaway</p>
        </div>
    </div>

    <div class="main-card">
        <div class="flex justify-center gap-5 -mt-12 mb-8 relative z-20">
            <button @click="currentTab = 'itinerary'" :class="{active: currentTab === 'itinerary'}" class="tab-btn"><i class="fa-solid fa-map"></i></button>
            <button @click="currentTab = 'expense'" :class="{active: currentTab === 'expense'}" class="tab-btn"><i class="fa-solid fa-receipt"></i></button>
        </div>

        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-8 pb-2 no-scrollbar">
                <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" 
                     :class="['day-pill', selectedDayIndex === index ? 'active' : 'bg-stone-50 text-stone-300']">
                    <div class="text-[9px] font-bold">{{ day.weekday }}</div>
                    <div class="text-lg font-black">{{ day.date }}</div>
                </div>
            </div>

            <div v-if="shouldShowHotel" class="hotel-box flex items-center justify-between" @click="openHotelModal">
                <div class="flex items-center flex-1 pr-4">
                    <div class="w-11 h-11 bg-white rounded-xl flex items-center justify-center mr-3 shadow-sm text-stone-300">
                        <i class="fa-solid fa-bed text-lg"></i>
                    </div>
                    <div class="overflow-hidden">
                        <div class="text-[9px] font-black text-stone-400 uppercase tracking-widest">Accommodation</div>
                        <div class="font-bold text-gray-800 truncate">{{ currentDayHotel.name || 'Set Hotel for tonight' }}</div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <a v-if="currentDayHotel.googleLink" :href="currentDayHotel.googleLink" target="_blank" @click.stop class="w-9 h-9 bg-amber-50 text-amber-600 rounded-lg flex items-center justify-center border border-amber-100">
                        <i class="fa-solid fa-location-arrow text-sm"></i>
                    </a>
                    <i class="fa-solid fa-pen text-[10px] text-stone-300 ml-1"></i>
                </div>
            </div>

            <draggable v-model="itinerary" item-key="id" handle=".item-card" ghost-class="drag-ghost" @end="saveToLocal">
                <template #item="{element: item}">
                    <div v-if="item.dayDate === days[selectedDayIndex].date" @click="editItem(item)" class="item-card">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex flex-wrap gap-2">
                                <span class="bg-red-50 text-[#8B0000] px-2.5 py-1 rounded-lg font-black text-xs">
                                    {{ item.time }}<template v-if="item.endTime"> - {{item.endTime}}</template>
                                </span>
                                <span v-if="item.type" class="bg-stone-100 text-stone-500 px-2.5 py-1 rounded-lg font-bold text-[10px] uppercase">{{ item.type }}</span>
                            </div>
                            <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="font-black text-gray-800 text-lg leading-tight">{{ item.name }}</div>
                        <div v-if="item.note" class="text-gray-400 text-xs mt-2">{{ item.note }}</div>
                        <a v-if="item.googleLink" :href="item.googleLink" target="_blank" @click.stop class="mt-4 inline-flex items-center gap-2 text-amber-600 font-bold text-xs bg-amber-50 px-3 py-2 rounded-xl">
                            <i class="fa-solid fa-map-pin"></i> Open Maps
                        </a>
                    </div>
                </template>
            </draggable>

            <div v-if="currentDayPlansCount === 0" class="text-center py-20 opacity-20 italic font-bold">No plans yet</div>
        </div>
    </div>

    <button class="fab" @click="openAddModal"><i class="fa-solid fa-plus"></i></button>

    <div v-if="showHotelModal" class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/70 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm p-8 rounded-[35px]">
            <h3 class="font-black text-xl mb-6 text-center">Accommodation Info</h3>
            <div class="space-y-4">
                <input v-model="hotelForm.name" placeholder="Hotel Name" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
                <input v-model="hotelForm.googleLink" placeholder="Google Maps Link" class="w-full p-4 bg-blue-50/50 rounded-xl text-blue-600 text-sm outline-none">
                <button @click="saveHotel" class="w-full bg-gray-900 text-white py-4 rounded-xl font-black shadow-lg">Update Hotel</button>
                <button @click="showHotelModal = false" class="w-full py-2 text-stone-400 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div v-if="showModal" class="fixed inset-0 z-[200] flex items-end bg-black/70 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[40px] max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <h3 class="font-black text-2xl mb-6 text-gray-800">{{ isEditing ? 'Edit Plan' : 'New Plan' }}</h3>
            <div class="space-y-4">
                <input v-model="form.name" placeholder="Name / Location" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
                
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="flex flex-col"><span class="text-[10px] ml-2 text-gray-400 font-bold">START</span><input v-model="form.time" type="time" class="p-4 bg-gray-50 rounded-xl font-bold outline-none"></div>
                    <div class="flex flex-col"><span class="text-[10px] ml-2 text-gray-400 font-bold">END (OPTIONAL)</span><input v-model="form.endTime" type="time" class="p-4 bg-gray-50 rounded-xl font-bold outline-none"></div>
                </div>

                <input v-model="form.type" placeholder="Category (e.g. Flight, Car Rent)" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
                <input v-model="form.googleLink" placeholder="Google Maps Link" class="w-full p-4 bg-blue-50/50 rounded-xl text-blue-600 text-sm outline-none">
                <textarea v-model="form.note" placeholder="Notes..." class="w-full p-4 bg-gray-50 rounded-xl h-24 outline-none"></textarea>
                
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-5 rounded-2xl font-black shadow-xl">SAVE CHANGES</button>
                <button @click="showModal = false" class="w-full py-2 text-stone-400 font-bold uppercase text-xs tracking-widest">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        components: { 'draggable': window.vuedraggable },
        setup() {
            const currentTab = ref('itinerary');
            const showModal = ref(false);
            const showHotelModal = ref(false);
            const isEditing = ref(false);
            const selectedDayIndex = ref(0);

            const days = [
                { date: '14', weekday: 'THU' }, { date: '15', weekday: 'FRI' }, { date: '16', weekday: 'SAT' },
                { date: '17', weekday: 'SUN' }, { date: '18', weekday: 'MON' }, { date: '19', weekday: 'TUE' },
                { date: '20', weekday: 'WED' }, { date: '21', weekday: 'THU' }, { date: '22', weekday: 'FRI' },
                { date: '23', weekday: 'SAT' }, { date: '24', weekday: 'SUN' }, { date: '25', weekday: 'MON' }
            ];

            const itinerary = ref([]);
            const hotels = ref({});
            const form = ref({ id: null, name: '', time: '12:00', endTime: '', type: '', googleLink: '', note: '', dayDate: '' });
            const hotelForm = ref({ name: '', googleLink: '' });

            const STORAGE_KEY = 'tiramisu_final_v1';

            onMounted(() => {
                itinerary.value = JSON.parse(localStorage.getItem(STORAGE_KEY + '_i')) || [];
                hotels.value = JSON.parse(localStorage.getItem(STORAGE_KEY + '_h')) || {};
            });

            const saveToLocal = () => {
                localStorage.setItem(STORAGE_KEY + '_i', JSON.stringify(itinerary.value));
                localStorage.setItem(STORAGE_KEY + '_h', JSON.stringify(hotels.value));
            };

            const currentDayPlansCount = computed(() => itinerary.value.filter(i => i.dayDate === days[selectedDayIndex.value].date).length);
            const currentDayHotel = computed(() => hotels.value[days[selectedDayIndex.value].date] || { name: '', googleLink: '' });
            const shouldShowHotel = computed(() => {
                const d = parseInt(days[selectedDayIndex.value].date);
                return d >= 15 && d <= 24;
            });

            const openAddModal = () => {
                isEditing.value = false;
                form.value = { id: null, name: '', time: '12:00', endTime: '', type: '', googleLink: '', note: '', dayDate: days[selectedDayIndex.value].date };
                showModal.value = true;
            };

            const editItem = (item) => {
                isEditing.value = true;
                form.value = { ...item };
                showModal.value = true;
            };

            const handleSave = () => {
                if (!form.value.name) return;
                if (isEditing.value) {
                    const idx = itinerary.value.findIndex(i => i.id === form.value.id);
                    itinerary.value[idx] = { ...form.value };
                } else {
                    itinerary.value.push({ ...form.value, id: Date.now() });
                }
                saveToLocal();
                showModal.value = false;
            };

            const openHotelModal = () => { hotelForm.value = { ...currentDayHotel.value }; showHotelModal.value = true; };
            const saveHotel = () => {
                hotels.value[days[selectedDayIndex.value].date] = { ...hotelForm.value };
                saveToLocal();
                showHotelModal.value = false;
            };

            const removeItem = (id) => { itinerary.value = itinerary.value.filter(i => i.id !== id); saveToLocal(); };

            return {
                currentTab, days, selectedDayIndex, itinerary, hotels, shouldShowHotel, isEditing,
                currentDayHotel, showModal, showHotelModal, form, hotelForm, currentDayPlansCount,
                openAddModal, editItem, handleSave, openHotelModal, saveHotel, removeItem, saveToLocal
            };
        }
    }).mount('#app');
</script>
</body>
</html>
