<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet as Tiramisu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; --italy-gold: #C5A059; }
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .banner { height: 380px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 25px 60px 25px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 10%, rgba(0,0,0,0.7) 100%); }
        
        .main-card { margin-top: -30px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 10; padding: 25px 20px; padding-bottom: 120px; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); }
        
        .tab-group { position: absolute; right: 20px; top: -75px; display: flex; flex-direction: column; gap: 12px; z-index: 30; }
        .tab-btn { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: white; color: #D1D5DB; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-size: 20px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.3); }
        .tab-btn.active { background: var(--italy-red); color: white; transform: scale(1.05); }
        
        .day-pill { flex-shrink: 0; width: 54px; padding: 14px 0; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .day-pill.active { background: var(--italy-red); color: white; box-shadow: 0 8px 15px rgba(139,0,0,0.25); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .item-card { border-left: 4px solid var(--italy-gold); border-radius: 24px; background: #fff; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #F3F4F6; position: relative; }
        
        .transit-connector { margin: 6px 0 6px 40px; border-left: 2px dashed #E5E7EB; padding: 12px 0 12px 25px; position: relative; }
        .transit-connector::before { content: '\f1b9'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; left: -11px; top: 50%; transform: translateY(-50%); background: #FDFBF7; padding: 4px 0; color: #C5A059; font-size: 14px; }
        
        .hotel-box { background: #FAF9F6; border: 1px dashed #E5E0D8; padding: 20px; border-radius: 28px; margin-bottom: 25px; transition: 0.2s; }
        .fab { position: fixed; bottom: 35px; right: 25px; width: 64px; height: 64px; background: var(--italy-red); border-radius: 22px; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 100; box-shadow: 0 12px 24px rgba(139,0,0,0.3); border: none; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #10B981; box-shadow: 0 0 8px #10B981; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10 max-w-[70%]">
            <div class="flex items-center mb-2">
                <span class="status-dot online"></span>
                <span class="text-[9px] text-white/70 font-black tracking-[0.2em] uppercase">Cloud Sync Active</span>
            </div>
            <h1 class="text-white text-4xl font-black italic mb-2 tracking-tight">Sweet as Tiramisu</h1>
            <p class="text-white/90 text-[10px] font-bold uppercase tracking-[0.2em]">Helen & Ryan’s 2026 Getaway</p>
        </div>
    </div>

    <div class="main-card">
        <div class="tab-group">
            <button @click="currentTab = 'itinerary'" :class="{active: currentTab === 'itinerary'}" class="tab-btn">
                <i class="fa-solid fa-map-location-dot"></i>
            </button>
            <button @click="currentTab = 'expense'" :class="{active: currentTab === 'expense'}" class="tab-btn">
                <i class="fa-solid fa-receipt"></i>
            </button>
        </div>

        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-10 pb-4 no-scrollbar">
                <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" 
                     :class="['day-pill', selectedDayIndex === index ? 'active' : 'bg-stone-50 text-stone-300']">
                    <div class="text-[10px] font-bold opacity-60">{{ day.weekday }}</div>
                    <div class="text-xl font-black">{{ day.date }}</div>
                </div>
            </div>

            <div v-if="shouldShowHotel" class="hotel-box flex items-center justify-between shadow-sm" @click="handleHotelClick">
                <div class="flex items-center flex-1 pr-4">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center mr-4 shadow-sm text-[#C5A059] border border-stone-100">
                        <i class="fa-solid fa-hotel text-lg"></i>
                    </div>
                    <div>
                        <div class="text-[9px] font-black text-stone-400 uppercase tracking-widest mb-0.5">Accommodation</div>
                        <div class="font-bold text-gray-800 truncate text-base">{{ currentDayHotel.name || 'Set Hotel' }}</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div v-if="currentDayHotel.link" class="w-10 h-10 bg-amber-100 text-amber-700 rounded-xl flex items-center justify-center border border-amber-200">
                        <i class="fa-solid fa-location-arrow text-sm"></i>
                    </div>
                    <button @click.stop="openHotelModal" class="w-10 h-10 bg-white text-stone-300 rounded-xl flex items-center justify-center border border-stone-100">
                        <i class="fa-solid fa-pen-to-square text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="space-y-0">
                <template v-for="(item, index) in currentDayPlans" :key="item.id">
                    <div @click="editItem(item)" class="item-card">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex gap-2">
                                <span class="bg-red-50 text-[#8B0000] px-3 py-1 rounded-full font-black text-[11px] border border-red-100/50">
                                    {{ item.time }} <template v-if="item.endTime">- {{item.endTime}}</template>
                                </span>
                                <span v-if="item.category" class="bg-stone-100 text-stone-500 px-3 py-1 rounded-full font-bold text-[10px] uppercase tracking-wider">{{ item.category }}</span>
                            </div>
                            <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="font-black text-gray-800 text-xl leading-snug mb-2">{{ item.name }}</div>
                        <div v-if="item.note" class="text-gray-400 text-xs leading-relaxed line-clamp-2">{{ item.note }}</div>
                        <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="mt-4 inline-flex items-center gap-2 text-amber-600 font-bold text-[11px] bg-amber-50 px-4 py-2 rounded-xl border border-amber-100">
                            <i class="fa-solid fa-location-dot"></i> GOOGLE MAPS
                        </a>
                    </div>

                    <div v-if="shouldShowTransit(index)" class="transit-connector">
                        <div @click="openRoute(item, currentDayPlans[index+1])" class="flex items-center justify-between bg-white rounded-2xl p-4 pr-5 border border-stone-100 shadow-sm active:scale-95 transition-all cursor-pointer">
                            <div class="flex flex-col">
                                <div class="text-[9px] font-black text-amber-600 uppercase tracking-widest mb-1">Navigation</div>
                                <div class="text-[12px] font-black text-gray-800">Route to Next Destination</div>
                            </div>
                            <div class="flex items-center gap-2 text-[11px] font-black text-white bg-blue-500 px-4 py-2 rounded-xl shadow-md">
                                <i class="fa-solid fa-diamond-turn-right"></i> GO
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div v-if="currentTab === 'expense'">
            <div class="bg-stone-900 rounded-[35px] p-8 mb-8 text-white shadow-2xl relative overflow-hidden">
                <p class="text-white/40 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Total Estimated Spending</p>
                <h2 class="text-4xl font-black italic">HKD ${{ formatMoney(totalExpense) }}</h2>
                <i class="fa-solid fa-coins absolute -right-4 -bottom-4 text-white/5 text-8xl"></i>
            </div>
            <div class="space-y-3">
                <div v-for="ex in expenses" :key="ex.id" class="flex justify-between items-center bg-white rounded
