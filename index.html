<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helen & Ryan's Trip 2026</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; }
        body { background-color: #FDFBF7; font-family: -apple-system, sans-serif; color: #1F2937; overflow-x: hidden; }
        
        /* Banner & Cover */
        .banner { 
            min-height: 380px; 
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%), 
                        url('./cover.jpg') center center / cover no-repeat;
            position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; background-color: #2c2c2c;
        }
        
        .tz-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 8px 12px; display: inline-flex; gap: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .tz-time { font-size: 11px; font-weight: 800; color: white; font-variant-numeric: tabular-nums; }
        .tab-btn { padding: 12px 14px; border-radius: 16px; font-weight: 800; font-size: 9px; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); border: none; white-space: nowrap; text-transform: uppercase; }
        .tab-btn.active { background: white; color: var(--italy-red); transform: scale(1.05); }
        
        .main-card { margin-top: -35px; border-radius: 40px 40px 0 0; background: white; min-height: 100vh; position: relative; z-index: 20; padding: 25px 20px 120px; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); }
        .day-pill.active { background: var(--italy-red); color: white; }
        .item-card { border-radius: 24px; background: #fff; padding: 20px; border: 1px solid #F3F4F6; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 15px; position: relative; }
        .cat-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        
        .fab { position: fixed; bottom: 30px; right: 25px; width: 68px; height: 68px; background: var(--italy-red); border-radius: 24px; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 100; box-shadow: 0 12px 30px rgba(139,0,0,0.4); }
        .transit-container { margin-left: 35px; border-left: 2px dashed #E5E7EB; padding: 12px 0 12px 25px; margin-top: -5px; margin-bottom: 10px; }
        
        /* 匯率輸入框樣式 */
        .rate-input { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 2px 6px; width: 45px; text-align: center; color: white; font-weight: 900; outline: none; }
        .rate-input:focus { border-color: white; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10">
            <h1 class="text-white text-3xl font-black italic mb-1 leading-none">Sweet as Tiramisu</h1>
            <p class="text-white/90 text-sm font-bold mb-4">Italy + UK 2026</p>
            <div class="tz-card">
                <div class="text-center"><div class="text-[8px] text-white/50 uppercase font-black">HK</div><div class="tz-time">{{ times.hk }}</div></div>
                <div class="text-center border-l border-white/10 pl-4"><div class="text-[8px] text-white/50 uppercase font-black">Italy</div><div class="tz-time">{{ times.it }}</div></div>
                <div class="text-center border-l border-white/10 pl-4"><div class="text-[8px] text-white/50 uppercase font-black">UK</div><div class="tz-time">{{ times.uk }}</div></div>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar">
                <button v-for="t in ['itinerary','expense','bookmark','checklist']" @click="currentTab=t" :class="['tab-btn', currentTab===t?'active':'']">{{t}}</button>
            </div>
        </div>
    </div>

    <div class="main-card">
        <div v-if="currentTab === 'itinerary'">
            <div class="flex space-x-3 overflow-x-auto mb-6 pb-2 no-scrollbar">
                <div v-for="(day, idx) in days" @click="selectedDayIndex = idx" :class="['day-pill shrink-0 w-[55px] py-4 rounded-[22px] text-center cursor-pointer', selectedDayIndex === idx ? 'active' : 'bg-[#F9F8F6] text-[#D1D5DB]']">
                    <div class="text-[9px] font-bold uppercase">{{ day.weekday }}</div><div class="text-xl font-black">{{ day.date }}</div>
                </div>
            </div>
            <div class="space-y-0">
                <template v-for="(item, index) in currentDayPlans" :key="item.id">
                    <div @click="editItem(item)" class="item-card">
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-stone-100 text-stone-600 px-3 py-1 rounded-full font-black text-[10px]">{{ item.time }} <span v-if="item.endTime">- {{ item.endTime }}</span></span>
                            <button @click.stop="removeItem(item.id, 'plans')" class="text-stone-200"><i class="fa-solid fa-circle-xmark text-lg"></i></button>
                        </div>
                        <div :class="['cat-badge', getCatClass(item.category)]"><i :class="['fa-solid', getCategoryIcon(item.category)]"></i> {{ item.category }}</div>
                        <div class="font-black text-gray-800 text-xl leading-tight">{{ item.name }}</div>
                        <p v-if="item.remark" class="text-[11px] text-stone-400 font-bold mt-1">{{ item.remark }}</p>
                        <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="inline-flex items-center gap-2 text-blue-600 font-black text-[10px] mt-3 bg-blue-50 px-3 py-2 rounded-xl border border-blue-100 uppercase italic">
                            <i class="fa-solid fa-location-dot"></i> Google Map
                        </a>
                    </div>
                    <div v-if="index < currentDayPlans.length - 1" class="transit-container">
                        <div @click="openTransitModal(item)" class="bg-[#F8FAFC] border border-[#F1F5F9] px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400 inline-flex items-center gap-2 cursor-pointer">
                            <i :class="['fa-solid', getTransitIcon(item.transitMode || 'walk')]"></i>
                            {{ item.transitRemark || 'Add Route Info' }}
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div v-if="currentTab === 'expense'">
            <div class="bg-stone-900 text-white p-8 rounded-[40px] mb-8 text-center shadow-2xl">
                <div class="flex justify-around mb-8 px-2 text-[9px] font-black uppercase text-white/40">
                    <div>EUR: <input v-model.number="rates.eur" class="rate-input" @change="saveRates"></div>
                    <div>GBP: <input v-model.number="rates.gbp" class="rate-input" @change="saveRates"></div>
                </div>
                <div class="text-4xl font-black italic tracking-tighter">HK$ {{ totalSpentHKD }}</div>
            </div>
            </div>
        
        </div>

    <div v-if="showModal" class="fixed inset-0 z-[300] flex items-end bg-black/70 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[40px] max-h-[90vh] overflow-y-auto pb-12 shadow-2xl">
            <h3 class="font-black text-xl mb-6 text-center italic">Details</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-2">
                    <button v-for="c in ['Spot','Food','Shop','Stay','Flight','Train']" @click="form.category=c" :class="['p-3 rounded-xl border-2 font-black text-[10px] uppercase', form.category===c?'border-indigo-600 bg-indigo-50 text-indigo-600':'border-gray-100 text-gray-300']">{{c}}</button>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Custom Category</label>
                    <input v-model="form.category" placeholder="e.g. Drop Bag" class="w-full p-4 bg-gray-50 rounded-xl font-bold border-none mt-1">
                </div>
                <input v-model="form.name" placeholder="Title / Name" class="w-full p-4 bg-gray-100 rounded-xl font-black border-none">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col"><label class="text-[8px] font-black text-gray-400 mb-1 ml-2 uppercase">Start</label><input v-model="form.time" type="time" class="p-4 bg-gray-50 rounded-xl font-black border-none"></div>
                    <div class="flex flex-col"><label class="text-[8px] font-black text-gray-400 mb-1 ml-2 uppercase">End</label><input v-model="form.endTime" type="time" class="p-4 bg-gray-50 rounded-xl font-black border-none"></div>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-gray-400 ml-1">Remark / Notes</label>
                    <textarea v-model="form.remark" placeholder="Add notes here..." class="w-full p-4 bg-gray-50 rounded-xl font-bold border-none mt-1" rows="2"></textarea>
                </div>
                <input v-model="form.link" placeholder="Google Maps URL" class="w-full p-4 bg-gray-50 rounded-xl text-[10px] font-bold border">
                
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-5 rounded-2xl font-black shadow-lg uppercase mt-4">Save</button>
                <button @click="showModal=false" class="w-full py-2 text-stone-300 font-bold text-xs uppercase text-center">Cancel</button>
            </div>
        </div>
    </div>

    <button class="fab shadow-xl" @click="handleFabAction"><i class="fa-solid fa-plus"></i></button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBrFeReAOrWqTnGCfFRVjLM1dZ09ar-OyE", authDomain: "italy-uk-trip.firebaseapp.com", projectId: "italy-uk-trip", databaseURL: "https://italy-uk-trip-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary'), selectedDayIndex = ref(0);
            const showModal = ref(false), showTransitModal = ref(false);
            const itinerary = ref([]), expenses = ref([]), rates = ref({ eur: 8.5, gbp: 10.2 });
            const form = ref({ id: null, name: '', time: '09:00', endTime: '', dayDate: '14', category: 'Spot', link: '', remark: '' });
            const times = ref({ hk:'--', it:'--', uk:'--' });
            const days = [{date:'14',weekday:'THU'},{date:'15',weekday:'FRI'},{date:'16',weekday:'SAT'},{date:'17',weekday:'SUN'},{date:'18',weekday:'MON'},{date:'19',weekday:'TUE'},{date:'20',weekday:'WED'},{date:'21',weekday:'THU'},{date:'22',weekday:'FRI'},{date:'23',weekday:'SAT'},{date:'24',weekday:'SUN'},{date:'25',weekday:'MON'}];

            onMounted(() => {
                db.ref('plans').on('value', s => itinerary.value = s.val() ? Object.values(s.val()) : []);
                db.ref('expenses').on('value', s => expenses.value = s.val() ? Object.values(s.val()) : []);
                db.ref('rates').on('value', s => { if(s.val()) rates.value = s.val(); });
                
                setInterval(() => {
                    const n = new Date(); const opt = { hour:'2-digit', minute:'2-digit', hour12:false };
                    times.value.hk = n.toLocaleTimeString('en-GB', { ...opt, timeZone:'Asia/Hong_Kong' });
                    times.value.it = n.toLocaleTimeString('en-GB', { ...opt, timeZone:'Europe/Rome' });
                    times.value.uk = n.toLocaleTimeString('en-GB', { ...opt, timeZone:'Europe/London' });
                }, 1000);
            });

            return {
                currentTab, days, selectedDayIndex, times, showModal, form, rates,
                currentDayPlans: computed(() => itinerary.value.filter(p => p.dayDate === days[selectedDayIndex.value].date).sort((a,b) => a.time.localeCompare(b.time))),
                totalSpentHKD: computed(() => expenses.value.reduce((sum, ex) => sum + parseFloat(ex.amount * (ex.currency === 'EUR' ? rates.value.eur : (ex.currency === 'GBP' ? rates.value.gbp : 1))), 0).toFixed(0)),
                saveRates: () => db.ref('rates').set(rates.value),
                handleSave: () => { const id = form.value.id || Date.now(); db.ref(`plans/${id}`).set({...form.value, id}); showModal.value=false; },
                handleFabAction: () => { form.value={id:null, name:'', time:'09:00', endTime:'', dayDate:days[selectedDayIndex.value].date, category:'Spot', link:'', remark:''}; showModal.value=true; },
                editItem: (item) => { form.value = {...item}; showModal.value = true; },
                removeItem: (id, path) => { if(confirm('Delete?')) db.ref(`${path}/${id}`).remove(); },
                getCategoryIcon: (c) => ({ Food:'fa-utensils', Flight:'fa-plane', Shop:'fa-bag-shopping', Spot:'fa-camera', Stay:'fa-hotel', Train:'fa-train' }[c] || 'fa-star'),
                getCatClass: (c) => ({ Spot:'bg-orange-100 text-orange-600', Food:'bg-emerald-100 text-emerald-600', Shop:'bg-pink-100 text-pink-600', Flight:'bg-blue-100 text-blue-600', Stay:'bg-indigo-100 text-indigo-600', Train:'bg-amber-100 text-amber-600' }[c] || 'bg-gray-100 text-gray-500'),
                getTransitIcon: (m) => ({ walk:'fa-person-walking', bus:'fa-bus', train:'fa-train-subway', taxi:'fa-taxi' }[m] || 'fa-person-walking')
            };
        }
    }).mount('#app');
</script>
</body>
</html>
