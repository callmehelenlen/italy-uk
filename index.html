<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sweet as Tiramisu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --italy-red: #8B0000; --italy-gold: #C5A059; }
        body { background-color: #FDFBF7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #1F2937; }
        .banner { height: 320px; background-image: url('cover.jpg'); background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 25px 40px 25px; }
        .banner::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); }
        .main-card { margin-top: -30px; border-radius: 35px 35px 0 0; background: white; min-height: 100vh; position: relative; z-index: 10; padding: 25px 20px 120px 20px; }
        .day-pill.active { background: var(--italy-red); color: white; box-shadow: 0 8px 15px rgba(139,0,0,0.25); }
        
        /* 酒店置頂區樣式 */
        .stay-banner { background: #F5F3FF; border: 2px solid #DDD6FE; border-radius: 20px; padding: 15px; margin-bottom: 25px; position: relative; }
        .stay-label { position: absolute; top: -10px; left: 15px; background: #8B5CF6; color: white; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 6px; text-transform: uppercase; }
        
        .item-card { border-radius: 22px; background: #fff; padding: 18px; border: 1px solid #F3F4F6; margin-bottom: 4px; }
        .transit-container { margin: 6px 0 6px 35px; padding-left: 15px; border-left: 2px dashed #E5E7EB; display: flex; align-items: center; gap: 10px; min-height: 40px; }
        .transit-badge { background: #F8FAFC; border: 1px solid #F1F5F9; padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 800; color: #64748B; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .fab { position: fixed; bottom: 30px; right: 25px; width: 64px; height: 64px; background: var(--italy-red); border-radius: 22px; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 100; box-shadow: 0 10px 25px rgba(139,0,0,0.3); border:none; }
    </style>
</head>
<body>

<div id="app" v-cloak>
    <div class="banner">
        <div class="relative z-10">
            <h1 class="text-white text-4xl font-black italic">Sweet as Tiramisu</h1>
            <p class="text-white/70 text-[10px] font-bold tracking-widest uppercase mt-2">Italy Journey 2026</p>
        </div>
    </div>

    <div class="main-card">
        <div class="flex space-x-3 overflow-x-auto mb-6 pb-2 no-scrollbar">
            <div v-for="(day, index) in days" :key="index" @click="selectedDayIndex = index" 
                 :class="['day-pill shrink-0 w-[50px] py-4 rounded-[20px] text-center cursor-pointer transition-all', selectedDayIndex === index ? 'active' : 'bg-[#F9F8F6] text-[#D1D5DB]']">
                <div class="text-[9px] font-bold opacity-60">{{ day.weekday }}</div>
                <div class="text-lg font-black">{{ day.date }}</div>
            </div>
        </div>

        <div v-if="currentStay" class="stay-banner shadow-sm" @click="editItem(currentStay)">
            <div class="stay-label">Current Stay</div>
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-black text-indigo-900 text-base leading-tight">{{ currentStay.name }}</div>
                    <div class="text-[10px] text-indigo-400 font-bold mt-1 uppercase">
                        <i class="fa-solid fa-hotel mr-1"></i> {{ currentStay.note }}
                    </div>
                </div>
                <div class="flex gap-2">
                    <a v-if="currentStay.link" :href="currentStay.link" target="_blank" @click.stop class="w-10 h-10 bg-white border border-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shadow-sm">
                        <i class="fa-solid fa-location-dot"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="space-y-0">
            <template v-for="(item, index) in currentDayPlans" :key="item.id">
                <div @click="editItem(item)" class="item-card shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-stone-100 text-stone-600 px-3 py-1 rounded-full font-black text-[10px]">{{ item.time }}</span>
                        <button @click.stop="removeItem(item.id)" class="text-stone-200"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                    <div class="font-black text-gray-800 text-lg mb-1">{{ item.name }}</div>
                    <div class="text-[9px] font-black text-stone-400 uppercase mb-3 flex items-center gap-2">
                        <i :class="['fa-solid', getCategoryIcon(item.category)]"></i> {{ item.category }}
                    </div>
                    
                    <a v-if="item.link" :href="item.link" target="_blank" @click.stop class="inline-flex items-center gap-2 text-blue-600 font-bold text-[10px] bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100">
                        <i class="fa-solid fa-map-pin"></i> Open in Maps
                    </a>
                </div>

                <div v-if="index < currentDayPlans.length - 1" class="transit-container">
                    <div @click="openTransitModal(item)" class="transit-badge shadow-sm">
                        <i :class="['fa-solid', getTransitIcon(item.transitMode || 'walk')]"></i>
                        <span>{{ item.transitRemark || 'Add route info' }}</span>
                    </div>
                    <a v-if="item.transitLink" :href="item.transitLink" target="_blank" class="w-8 h-8 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 border border-indigo-100">
                        <i class="fa-solid fa-route text-xs"></i>
                    </a>
                </div>
            </template>
        </div>
    </div>

    <button class="fab" @click="openAddModal"><i class="fa-solid fa-plus"></i></button>

    <div v-if="showModal" class="fixed inset-0 z-[200] flex items-end bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full p-8 rounded-t-[40px] max-h-[90vh] overflow-y-auto pb-12 shadow-2xl">
            <h3 class="font-black text-2xl mb-6">Plan Details</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-5 gap-2">
                    <div v-for="cat in ['Spot', 'Food', 'Shop', 'Flight', 'Stay']" :key="cat" @click="form.category = cat" :class="['p-2 rounded-xl border-2 text-center transition-all', form.category === cat ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-gray-50 text-gray-300']">
                        <i :class="['fa-solid', getCategoryIcon(cat)]" class="block text-sm mb-1"></i>
                        <span class="text-[8px] font-black uppercase">{{ cat }}</span>
                    </div>
                </div>
                <input v-model="form.name" placeholder="Name (e.g. Hotel or Restaurant)" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input v-model="form.time" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none">
                    <input v-model="form.endTime" type="time" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none outline-none">
                </div>
                <textarea v-model="form.note" placeholder="Note (For Stay: enter '15-24' to pin every day)" class="w-full p-4 bg-gray-50 rounded-2xl h-20 text-sm border-none outline-none"></textarea>
                <input v-model="form.link" placeholder="Google Maps Link" class="w-full p-4 bg-gray-50 rounded-2xl text-xs border-none outline-none">
                <button @click="handleSave" class="w-full bg-[#8B0000] text-white py-5 rounded-2xl font-black shadow-lg">SAVE PLAN</button>
                <button @click="showModal = false" class="w-full py-2 text-stone-300 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <div v-if="showTransitModal" class="fixed inset-0 z-[300] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm p-8 rounded-[40px] shadow-2xl">
            <h3 class="font-black text-xl mb-6 text-center">Route Settings</h3>
            <div class="grid grid-cols-5 gap-2 mb-4">
                <div v-for="m in ['walk', 'bus', 'train', 'taxi', 'plane']" :key="m" @click="transitForm.mode = m" :class="['p-3 rounded-xl border-2 text-center', transitForm.mode === m ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-gray-50 text-gray-400']">
                    <i :class="['fa-solid', getTransitIcon(m)]"></i>
                </div>
            </div>
            <input v-model="transitForm.remark" placeholder="e.g. 15 mins walk" class="w-full p-4 bg-gray-50 rounded-2xl font-bold mb-3 text-center border-none outline-none">
            <input v-model="transitForm.link" placeholder="Google Maps Route Link" class="w-full p-4 bg-gray-50 rounded-2xl text-xs mb-6 border-none outline-none">
            <button @click="saveTransit" class="w-full bg-black text-white py-4 rounded-2xl font-black">UPDATE ROUTE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBrFeReAOrWqTnGCfFRVjLM1dZ09ar-OyE",
        authDomain: "italy-uk-trip.firebaseapp.com",
        projectId: "italy-uk-trip",
        databaseURL: "https://italy-uk-trip-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const { createApp, ref, computed, onMounted } = Vue;
    createApp({
        setup() {
            const selectedDayIndex = ref(0);
            const showModal = ref(false);
            const showTransitModal = ref(false);
            const days = [{ date: '14', weekday: 'THU' }, { date: '15', weekday: 'FRI' }, { date: '16', weekday: 'SAT' }, { date: '17', weekday: 'SUN' }, { date: '18', weekday: 'MON' }, { date: '19', weekday: 'TUE' }, { date: '20', weekday: 'WED' }, { date: '21', weekday: 'THU' }, { date: '22', weekday: 'FRI' }, { date: '23', weekday: 'SAT' }, { date: '24', weekday: 'SUN' }, { date: '25', weekday: 'MON' }];
            const itinerary = ref([]);
            const form = ref({ id: null, name: '', time: '12:00', dayDate: '', category: 'Spot', link: '', note: '' });
            const transitForm = ref({ mode: 'walk', remark: '', link: '' });
            const activeTransitItem = ref(null);

            onMounted(() => {
                db.ref('plans').on('value', s => itinerary.value = s.val() ? Object.values(s.val()) : []);
            });

            // 核心邏輯：提取當前日期的置頂酒店
            const currentStay = computed(() => {
                const activeDate = parseInt(days[selectedDayIndex.value].date);
                return itinerary.value.find(p => {
                    if (p.category !== 'Stay') return false;
                    if (p.dayDate === days[selectedDayIndex.value].date) return true;
                    if (p.note) {
                        const match = p.note.match(/(\d+)-(\d+)/);
                        if (match) {
                            const start = parseInt(match[1]), end = parseInt(match[2]);
                            return activeDate >= start && activeDate <= end;
                        }
                    }
                    return false;
                });
            });

            // 行程邏輯：排除已經置頂顯示的酒店
            const currentDayPlans = computed(() => {
                const stayId = currentStay.value ? currentStay.value.id : null;
                return itinerary.value.filter(p => p.dayDate === days[selectedDayIndex.value].date && p.id !== stayId)
                    .sort((a,b) => a.time.localeCompare(b.time));
            });

            return { 
                days, selectedDayIndex, currentDayPlans, currentStay, showModal, showTransitModal, form, transitForm,
                handleSave: () => { const id = form.value.id || Date.now(); db.ref('plans/' + id).set({ ...form.value, id }); showModal.value = false; },
                editItem: (item) => { form.value = {...item}; showModal.value = true; },
                removeItem: (id) => { if(confirm('Delete?')) db.ref('plans/' + id).remove(); },
                openTransitModal: (item) => { activeTransitItem.value = item; transitForm.value = { mode: item.transitMode || 'walk', remark: item.transitRemark || '', link: item.transitLink || '' }; showTransitModal.value = true; },
                saveTransit: () => { db.ref('plans/'+activeTransitItem.value.id).update({ transitMode: transitForm.value.mode, transitRemark: transitForm.value.remark, transitLink: transitForm.value.link }); showTransitModal.value = false; },
                getCategoryIcon: (cat) => ({ Food:'fa-utensils', Flight:'fa-plane', Shop:'fa-bag-shopping', Spot:'fa-camera', Stay:'fa-hotel' }[cat] || 'fa-map-pin'),
                getTransitIcon: (mode) => ({ walk:'fa-person-walking', bus:'fa-bus', train:'fa-train', taxi:'fa-taxi', plane:'fa-plane' }[mode]),
                openAddModal: () => { form.value = { id: null, name: '', time: '12:00', dayDate: days[selectedDayIndex.value].date, category: 'Spot', link: '', note: '' }; showModal.value = true; }
            };
        }
    }).mount('#app');
</script>
</body>
</html>
